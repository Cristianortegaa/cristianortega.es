<nav class="pointer-events-none fixed right-6 top-1/2 z-40 hidden -translate-y-1/2 flex-col items-end gap-4 lg:flex" aria-label="Navegación por secciones">
  @for (dot of dots; track dot.id) {
    <a [href]="'#' + dot.id" class="group pointer-events-auto flex items-center gap-3">
      <span class="translate-x-2 rounded-md bg-slate-900 px-2.5 py-1 text-xs font-medium whitespace-nowrap text-white opacity-0 shadow-md transition duration-200 group-hover:translate-x-0 group-hover:opacity-100">
        {{ dot.label }}
      </span>
      <span [class]="dotClasses(dot.id)"></span>
    </a>
  }
</nav>
