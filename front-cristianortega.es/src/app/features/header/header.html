<header class="sticky top-0 z-50 border-b border-slate-200 bg-white/80 backdrop-blur">
  <div class="mx-auto flex h-16 max-w-6xl items-center justify-between px-6 sm:px-8">
    <a href="#top" class="font-display text-lg font-semibold text-slate-900">
      Cristian Ortega<span class="text-accent">.</span>
    </a>

    <nav class="hidden items-center gap-8 md:flex">
      @for (link of links; track link.href) {
        <a [href]="link.href" class="text-sm font-medium text-slate-600 transition hover:text-slate-900">
          {{ link.label }}
        </a>
      }
    </nav>

    <a
      href="#pricing"
      appMagnetic
      class="cta-glow hidden items-center justify-center rounded-lg bg-accent px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-accent/90 md:inline-flex"
    >
      Pide tu presupuesto
    </a>

    <button
      type="button"
      (click)="toggleMenu()"
      class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-slate-200 text-slate-700 md:hidden"
      aria-label="Abrir menú"
    >
      @if (menuOpen()) {
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      } @else {
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      }
    </button>
  </div>

  @if (menuOpen()) {
    <nav class="flex flex-col gap-1 border-t border-slate-200 bg-white px-6 py-4 md:hidden">
      @for (link of links; track link.href) {
        <a
          [href]="link.href"
          (click)="closeMenu()"
          class="rounded-lg px-3 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50"
        >
          {{ link.label }}
        </a>
      }
      <a
        href="#pricing"
        (click)="closeMenu()"
        class="mt-2 inline-flex items-center justify-center rounded-lg bg-accent px-5 py-2.5 text-sm font-semibold text-white"
      >
        Pide tu presupuesto
      </a>
    </nav>
  }
</header>
