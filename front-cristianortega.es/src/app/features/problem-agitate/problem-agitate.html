<section class="bg-slate-50 px-6 py-24 sm:px-8">
  <div class="mx-auto max-w-4xl text-center">
    <h2 class="font-display text-3xl font-semibold text-slate-900 sm:text-4xl">¿Te suena esto?</h2>
    <p class="mt-4 text-slate-600">No estás solo. Es lo que me cuentan la mayoría de negocios antes de trabajar juntos.</p>

    <div class="mt-12 grid gap-4 text-left sm:grid-cols-2">
      @for (point of painPoints; track point.text) {
        <div class="flex items-start gap-3 rounded-xl border border-slate-200 bg-white p-5">
          <svg class="mt-0.5 h-5 w-5 shrink-0 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86 1.82 18a1.5 1.5 0 0 0 1.3 2.25h17.76a1.5 1.5 0 0 0 1.3-2.25L13.71 3.86a1.5 1.5 0 0 0-2.42 0Z" />
          </svg>
          <p class="text-slate-700">{{ point.text }}</p>
        </div>
      }
    </div>

    <p class="mt-10 font-display text-xl font-semibold text-slate-900">No tiene por qué seguir siendo así.</p>
  </div>
</section>
