<section class="relative overflow-hidden bg-slate-50 px-6 py-24 sm:px-8">
  <div class="pointer-events-none absolute inset-0 overflow-hidden">
    <div class="absolute top-0 left-1/2 h-72 w-72 -translate-x-1/2 rounded-full bg-red-400/5 blur-[110px]"></div>
  </div>

  <div class="relative mx-auto max-w-6xl">
    <div class="grid gap-14 lg:grid-cols-[1fr_0.85fr] lg:items-center">
      <!-- Texto -->
      <div class="text-center lg:text-left">
        <h2 class="font-display text-3xl font-semibold text-slate-900 sm:text-4xl">¿Te suena esto?</h2>
        <p class="mt-4 text-slate-600">No estás solo. Es lo que me cuentan la mayoría de negocios antes de trabajar juntos.</p>

        <div class="mt-10 grid gap-4 text-left">
          @for (point of painPoints; track point.text; let i = $index) {
            <div appReveal [revealDelay]="i * 90" class="flex items-start gap-3 rounded-xl border border-slate-200 bg-white p-5 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
              <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-red-50 text-red-400">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86 1.82 18a1.5 1.5 0 0 0 1.3 2.25h17.76a1.5 1.5 0 0 0 1.3-2.25L13.71 3.86a1.5 1.5 0 0 0-2.42 0Z" />
                </svg>
              </span>
              <p class="mt-1.5 text-slate-700">{{ point.text }}</p>
            </div>
          }
        </div>

        <p class="mt-10 inline-flex items-center gap-2 rounded-full border border-accent-emerald/20 bg-accent-emerald/5 px-5 py-2.5 font-display text-lg font-semibold text-slate-900 sm:text-xl">
          <svg class="h-5 w-5 shrink-0 text-accent-emerald" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 2 3 14h7l-1 8 10-12h-7l1-8Z" />
          </svg>
          No tiene por qué seguir siendo así.
        </p>
      </div>

      <!-- Mockup ilustrativo "web desactualizada" (decorativo) -->
      <div appReveal [revealDelay]="150" class="relative mx-auto hidden w-full max-w-md lg:block" aria-hidden="true">
        <div class="rotate-2 rounded-2xl border border-slate-200 bg-white p-2 shadow-xl shadow-slate-900/10 transition hover:rotate-0">
          <div class="flex items-center gap-1.5 rounded-t-lg bg-slate-100 px-3 py-2">
            <span class="h-2.5 w-2.5 rounded-full bg-slate-300"></span>
            <span class="h-2.5 w-2.5 rounded-full bg-slate-300"></span>
            <span class="h-2.5 w-2.5 rounded-full bg-slate-300"></span>
            <span class="ml-3 truncate rounded bg-slate-200 px-3 py-0.5 text-[10px] text-slate-400">tu-web-actual.com</span>
          </div>
          <div class="space-y-3 rounded-b-lg bg-white p-6">
            <div class="h-3 w-2/3 rounded bg-slate-200"></div>
            <div class="h-3 w-full rounded bg-slate-100"></div>
            <div class="h-3 w-5/6 rounded bg-slate-100"></div>

            <div class="mt-5 flex items-end justify-between rounded-lg bg-slate-50 p-4">
              <div class="flex items-end gap-1.5">
                <span class="h-6 w-2.5 rounded-sm bg-red-200"></span>
                <span class="h-9 w-2.5 rounded-sm bg-red-300"></span>
                <span class="h-5 w-2.5 rounded-sm bg-red-200"></span>
                <span class="h-3 w-2.5 rounded-sm bg-red-200"></span>
              </div>
              <span class="animate-pulse-soft inline-flex items-center gap-1 rounded-full bg-red-50 px-2.5 py-1 text-[10px] font-semibold text-red-400">
                <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h6l10 10M20 17v-6m0 6h-6" />
                </svg>
                Visitas en caída
              </span>
            </div>

            <div class="mt-4 h-8 w-1/3 rounded bg-slate-100"></div>
          </div>
        </div>

        <span class="absolute -top-4 -right-4 rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-semibold text-slate-500 shadow-lg">
          Página 5 en Google
        </span>
      </div>
    </div>
  </div>
</section>
