<div class="marquee-track relative overflow-hidden border-y border-slate-200 bg-slate-50 py-4">
  <div class="animate-marquee flex w-max items-center gap-10 whitespace-nowrap px-5">
    @for (item of items; track item) {
      <span class="inline-flex items-center gap-2 text-sm font-medium text-slate-500">
        <span class="h-1.5 w-1.5 rounded-full bg-accent-emerald"></span>
        {{ item }}
      </span>
    }
    @for (item of items; track item) {
      <span class="inline-flex items-center gap-2 text-sm font-medium text-slate-500" aria-hidden="true">
        <span class="h-1.5 w-1.5 rounded-full bg-accent-emerald"></span>
        {{ item }}
      </span>
    }
  </div>

  <div class="pointer-events-none absolute inset-y-0 left-0 w-16 bg-gradient-to-r from-slate-50 to-transparent"></div>
  <div class="pointer-events-none absolute inset-y-0 right-0 w-16 bg-gradient-to-l from-slate-50 to-transparent"></div>
</div>
