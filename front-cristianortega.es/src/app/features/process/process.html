<section id="proceso" class="scroll-mt-20 bg-slate-50 px-6 py-24 sm:px-8">
  <div class="mx-auto max-w-5xl">
    <div class="mx-auto max-w-2xl text-center">
      <h2 class="font-display text-3xl font-semibold text-slate-900 sm:text-4xl">Cómo trabajo</h2>
      <p class="mt-4 text-slate-600">Un proceso simple y transparente, de principio a fin.</p>
    </div>

    <div class="mt-14 grid gap-6 sm:grid-cols-2 lg:grid-cols-5">
      @for (step of steps; track step.number) {
        <div class="rounded-2xl border border-slate-200 bg-white p-6">
          <span class="font-display text-2xl font-semibold text-accent/40">{{ step.number }}</span>
          <h3 class="mt-3 text-base font-semibold text-slate-900">{{ step.title }}</h3>
          <p class="mt-2 text-sm leading-relaxed text-slate-600">{{ step.description }}</p>
        </div>
      }
    </div>
  </div>
</section>
